name: SonarQube PR Analysis

on:
  pull_request:
    branches:
      - main   # Your main branch name here

jobs:
  sonarqube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Needed for accurate analysis

      - name: Set up JDK (if needed)
        uses: actions/setup-java@v2
        with:
          java-version: '11'  # Adjust if your project uses Java

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=zbr123
            -Dsonar.projectKey=Zbr123_Testing-Automation-Silk
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}
            -Dsonar.pullrequest.provider=GitHub
