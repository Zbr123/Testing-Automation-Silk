name: SonarCloud PR Analysis

on:
  pull_request:
    branches:
      - main
      - webdriver-CICD
      - webdriver-browserstack
      - webdriver-Qase.io

  push:
    branches:
      - webdriver-CICD
      - webdriver-browserstack
      - webdriver-Qase.io

jobs:
  sonarqube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=zbr123
            -Dsonar.projectKey=Zbr123_Testing-Automation-Silk
            ${{ github.event_name == 'pull_request' && format('-Dsonar.pullrequest.key=%d -Dsonar.pullrequest.branch=%s -Dsonar.pullrequest.base=%s -Dsonar.pullrequest.provider=GitHub',
                github.event.pull_request.number,
                github.head_ref,
                github.base_ref) || '' }}
